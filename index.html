<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XM 图片设备时间生成器</title>
  <style>
    :root{
      --bg:#05070d; --glass:rgba(255,255,255,.12); --glass-strong:rgba(255,255,255,.2);
      --line:rgba(255,255,255,.22); --text:#f8fbff; --muted:#aab7c8; --blue:#4f8cff;
      --violet:#9b7cff; --green:#34d399; --shadow:0 32px 90px rgba(0,0,0,.42);
      --radius:34px;
    }
    *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Microsoft YaHei",sans-serif}
    body{min-height:100vh;color:var(--text);background:
      radial-gradient(circle at 12% 12%,rgba(79,140,255,.5),transparent 30rem),
      radial-gradient(circle at 88% 18%,rgba(155,124,255,.4),transparent 28rem),
      radial-gradient(circle at 58% 92%,rgba(52,211,153,.28),transparent 28rem),var(--bg);overflow-x:hidden}
    body:before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.045) 1px,transparent 1px);background-size:56px 56px;mask-image:radial-gradient(circle,#000 35%,transparent 75%);pointer-events:none}
    .shell{width:min(1220px,calc(100% - 28px));margin:0 auto;padding:28px 0 42px;position:relative;z-index:1}
    header{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:24px;padding:14px 16px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.1);backdrop-filter:blur(24px);box-shadow:0 12px 40px rgba(0,0,0,.18)}
    .brand{display:flex;align-items:center;gap:12px;font-weight:800;letter-spacing:.04em}.mark{width:44px;height:44px;border-radius:18px;background:linear-gradient(135deg,#fff,#94c3ff 42%,#8b5cf6);display:grid;place-items:center;color:#08111f;box-shadow:inset 0 1px 1px #fff,0 12px 28px rgba(79,140,255,.35)}
    .pill{color:var(--muted);font-size:14px}.hero{display:grid;grid-template-columns:410px 1fr;gap:22px;align-items:start}.panel{border:1px solid var(--line);background:linear-gradient(145deg,rgba(255,255,255,.16),rgba(255,255,255,.08));backdrop-filter:blur(30px);border-radius:var(--radius);box-shadow:var(--shadow)}
    .controls{padding:22px;position:sticky;top:18px}.controls h1{font-size:30px;line-height:1.12;margin-bottom:8px}.desc{color:var(--muted);line-height:1.6;margin-bottom:20px}.group{margin:16px 0}.group label{display:block;font-weight:700;margin-bottom:9px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.input,.select{width:100%;height:48px;border:1px solid var(--line);border-radius:18px;background:rgba(255,255,255,.12);color:var(--text);padding:0 14px;outline:none;transition:.25s}.input:focus,.select:focus{border-color:rgba(119,171,255,.9);box-shadow:0 0 0 5px rgba(79,140,255,.15)}.select option{color:#111}.range{width:100%;accent-color:var(--blue)}
    .upload{border:1.5px dashed rgba(255,255,255,.34);border-radius:26px;padding:18px;text-align:center;background:rgba(255,255,255,.08);cursor:pointer;transition:.3s}.upload:hover{transform:translateY(-2px);border-color:#9fc5ff;background:rgba(255,255,255,.14)}.upload input{display:none}.upload b{display:block;margin-bottom:6px}.upload span{color:var(--muted);font-size:13px}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}.btn{height:54px;border:none;border-radius:22px;color:white;font-weight:800;cursor:pointer;background:linear-gradient(135deg,var(--blue),var(--violet));box-shadow:0 16px 35px rgba(79,140,255,.32);transition:transform .22s,filter .22s}.btn:hover{transform:translateY(-3px) scale(1.01);filter:saturate(1.15)}.btn.secondary{background:rgba(255,255,255,.14);box-shadow:none;border:1px solid var(--line)}
    .stage{padding:26px;min-height:720px;display:grid;place-items:center;overflow:hidden}.phone-wrap{position:relative;animation:float 5.6s ease-in-out infinite}.phone{width:min(390px,78vw);aspect-ratio:9/19.5;border-radius:58px;padding:12px;background:#0c0d12;box-shadow:0 40px 80px rgba(0,0,0,.48),inset 0 0 0 2px rgba(255,255,255,.16)}.screen{position:relative;width:100%;height:100%;overflow:hidden;border-radius:46px;background:#141821}.screen img{width:100%;height:100%;object-fit:cover;display:block}.placeholder{height:100%;display:grid;place-items:center;text-align:center;padding:26px;color:#d9e5ff;background:linear-gradient(145deg,#16233c,#2b2142)}.status{position:absolute;top:0;left:0;right:0;height:48px;padding:12px 22px;display:flex;align-items:center;justify-content:space-between;font-size:14px;font-weight:800;color:white;text-shadow:0 1px 12px rgba(0,0,0,.55);background:linear-gradient(rgba(0,0,0,.35),transparent)}.notch{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:118px;height:32px;border-radius:999px;background:#050509}.icons{display:flex;align-items:center;gap:7px}.signal{display:flex;gap:2px;align-items:end}.signal i{display:block;width:3px;background:white;border-radius:2px}.signal i:nth-child(1){height:5px}.signal i:nth-child(2){height:8px}.signal i:nth-child(3){height:11px}.battery{width:28px;height:13px;border:1.8px solid white;border-radius:4px;padding:1.5px;position:relative}.battery:after{content:"";position:absolute;right:-4px;top:3px;width:2px;height:5px;background:white;border-radius:2px}.battery-level{height:100%;border-radius:2px;background:var(--green);width:70%}.caption{position:absolute;left:18px;right:18px;bottom:22px;padding:14px 16px;border-radius:24px;background:rgba(0,0,0,.38);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.18)}.caption b{display:block}.caption small{color:#dbe7ff}.spark{position:absolute;border-radius:999px;background:rgba(255,255,255,.35);filter:blur(1px);animation:spark 3s linear infinite}.spark.a{width:9px;height:9px;left:-28px;top:18%}.spark.b{width:12px;height:12px;right:-34px;top:58%;animation-delay:1s}.spark.c{width:7px;height:7px;left:8%;bottom:-28px;animation-delay:2s}@keyframes float{50%{transform:translateY(-13px) rotate(.5deg)}}@keyframes spark{50%{transform:translateY(-18px) scale(1.25);opacity:.35}}
    @media (max-width:900px){.hero{grid-template-columns:1fr}.controls{position:static}.stage{min-height:560px}header{border-radius:26px;align-items:flex-start;flex-direction:column}.pill{line-height:1.5}}
  </style>
</head>
<body>
  <main class="shell">
    <header><div class="brand"><div class="mark">XM</div><div><div>XM Studio</div><div class="pill">自定义图片 · 时间 · 设备 · 电量导出</div></div></div><div class="pill">iOS 26 风格圆润玻璃按钮 / 本地处理不上传</div></header>
    <section class="hero">
      <aside class="panel controls">
        <h1>生成你的 XM 手机截图</h1><p class="desc">导入任意图片，选择设备、时间、电量和底部文案，一键导出带状态栏的高清图片。</p>
        <label class="upload" for="imageInput"><input id="imageInput" type="file" accept="image/*"><b>点击导入图片</b><span>支持 JPG / PNG / WebP，图片只在浏览器本地预览</span></label>
        <div class="group grid2"><div><label for="device">手机设备</label><select id="device" class="select"><option>iPhone 17 Pro</option><option>iPhone 16 Pro Max</option><option>iPhone 15</option><option>XM Future Phone</option></select></div><div><label for="time">状态栏时间</label><input id="time" class="input" type="time" value="09:41"></div></div>
        <div class="group grid2"><div><label for="battery">电量 <span id="batteryText">70%</span></label><input id="battery" class="range" type="range" min="1" max="100" value="70"></div><div><label for="carrier">网络</label><select id="carrier" class="select"><option>5G</option><option>Wi‑Fi</option><option>LTE</option><option>XM Net</option></select></div></div>
        <div class="group"><label for="title">标题</label><input id="title" class="input" value="XM 自定义作品" maxlength="18"></div>
        <div class="group"><label for="subtitle">副标题</label><input id="subtitle" class="input" value="圆润、低调、有质感" maxlength="28"></div>
        <div class="actions"><button class="btn" id="download">导出图片</button><button class="btn secondary" id="demo">使用示例图</button></div>
      </aside>
      <section class="panel stage"><div class="phone-wrap"><i class="spark a"></i><i class="spark b"></i><i class="spark c"></i><div class="phone" id="capture"><div class="screen"><div class="placeholder" id="placeholder">请先导入图片<br>或点击“使用示例图”</div><img id="preview" alt="导入图片预览" hidden><div class="status"><span id="timeView">09:41</span><div class="notch"></div><div class="icons"><span id="carrierView">5G</span><span class="signal"><i></i><i></i><i></i></span><span class="battery"><span class="battery-level" id="batteryLevel"></span></span></div></div><div class="caption"><b id="titleView">XM 自定义作品</b><small id="subtitleView">圆润、低调、有质感</small></div></div></div></div></section>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script>
    const $=id=>document.getElementById(id);const preview=$('preview'),placeholder=$('placeholder');
    function sync(){ $('timeView').textContent=$('time').value||'09:41'; $('carrierView').textContent=$('carrier').value; $('titleView').textContent=$('title').value||'XM'; $('subtitleView').textContent=$('subtitle').value||' '; const b=$('battery').value; $('batteryText').textContent=b+'%'; $('batteryLevel').style.width=b+'%'; $('batteryLevel').style.background=b<20?'#fb7185':b<45?'#fbbf24':'#34d399'; }
    ['time','battery','carrier','title','subtitle','device'].forEach(id=>$(id).addEventListener('input',sync));sync();
    $('imageInput').addEventListener('change',e=>{const file=e.target.files[0];if(!file)return;preview.src=URL.createObjectURL(file);preview.hidden=false;placeholder.hidden=true;});
    $('demo').addEventListener('click',()=>{preview.src='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1950"><defs><linearGradient id="g" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#5eead4"/><stop offset=".45" stop-color="#60a5fa"/><stop offset="1" stop-color="#a78bfa"/></linearGradient></defs><rect width="900" height="1950" fill="url(#g)"/><circle cx="210" cy="420" r="180" fill="rgba(255,255,255,.28)"/><circle cx="710" cy="1260" r="260" fill="rgba(0,0,0,.14)"/><text x="80" y="930" font-size="128" font-family="Arial" font-weight="800" fill="white">XM</text><text x="80" y="1040" font-size="46" font-family="Arial" fill="white">Custom Image Studio</text></svg>`);preview.hidden=false;placeholder.hidden=true;});
    $('download').addEventListener('click',async()=>{const node=$('capture');const canvas=await html2canvas(node,{backgroundColor:null,scale:3,useCORS:true});const a=document.createElement('a');a.download='XM-device-image.png';a.href=canvas.toDataURL('image/png');a.click();});
  </script>
</body>
</html>
