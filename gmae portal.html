<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Portal 注册</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.7)),
url("https://picsum.photos/1920/1080");
background-size:cover;
color:white;
}

.card{
width:420px;
background:rgba(20,20,30,.95);
padding:35px;
border-radius:20px;
box-shadow:0 0 40px rgba(0,0,0,.5);
}

h1{
text-align:center;
margin-bottom:25px;
}

.input{
width:100%;
height:50px;
margin-bottom:15px;
background:#2b2f3a;
border:1px solid #444;
border-radius:10px;
padding:0 15px;
color:white;
}

.birthday{
display:flex;
gap:10px;
margin-bottom:15px;
}

.birthday select{
flex:1;
height:50px;
background:#2b2f3a;
border:1px solid #444;
border-radius:10px;
color:white;
padding:0 10px;
}

.gender{
display:flex;
gap:10px;
margin-bottom:15px;
}

.gender button{
flex:1;
height:50px;
background:#2b2f3a;
border:1px solid #444;
border-radius:10px;
color:white;
cursor:pointer;
}

.gender button:hover{
background:#3b4252;
}

.submit{
width:100%;
height:55px;
background:#2f6df6;
border:none;
border-radius:10px;
color:white;
font-size:18px;
cursor:pointer;
}

.submit:hover{
opacity:.9;
}

.small{
margin-top:15px;
font-size:12px;
color:#bbb;
line-height:1.6;
}
</style>
</head>

<body>

<div class="card">

<h1>注册账号</h1>

<div class="birthday">
<select><option>年</option></select>
<select><option>月</option></select>
<select><option>日</option></select>
</div>

<input class="input" placeholder="用户名">

<input class="input" type="email" placeholder="邮箱">

<input class="input" type="password" placeholder="密码">

<div class="gender">
<button type="button">♂ 男</button>
<button type="button">♀ 女</button>
</div>

<button class="submit" onclick="register()">
注册
</button>

<div class="small">
点击注册即表示同意服务条款和隐私政策。
</div>

</div>

<script>
function register(){
alert("注册成功！（演示版）");
}
</script>

</body>
</html>
